name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  hassfest:
    name: Hassfest (HA integration manifest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # brands pending — tracked in #169 (SVG→PNG + home-assistant/brands PR)
          ignore: brands
